<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メンテナンス</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060d1a; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; color: #e2e8f0; }
    input[type="month"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-box { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }
    .card { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .inp { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 9px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; font-family: inherit; }
    .sel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 9px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; font-family: inherit; }
    .lbl { color: #64748b; font-size: 11px; margin-bottom: 4px; display: block; }
    .btn-p { background: #2563eb; border: none; color: white; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit; }
    .btn-g { background: transparent; border: 1px solid #334155; color: white; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-d { background: #450a0a; border: 1px solid #7f1d1d; color: #f87171; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useEffect } = React;

const STORAGE_KEY = "car_maintenance_data_v5";

const initialData = {
  cars: [
    { id: 1, name: "セレナ", maker: "Nissan", model: "Serena", year: 2020, mileage: 86000, color: "#2563eb", oilInterval: 6000, oilType: "0W20", shakenExpiry: "", jibaishaExpiry: "", firstReg: "", carType: "", chassisNo: "" },
    { id: 2, name: "エブリィワゴン", maker: "Suzuki", model: "Every Wagon", year: 2025, mileage: 0, color: "#16a34a", oilInterval: 3000, oilType: "5W30", shakenExpiry: "", jibaishaExpiry: "", firstReg: "", carType: "", chassisNo: "" },
  ],
  records: [
    { id: 1, carId: 1, type: "cvt",     date: "2024-09-01", mileage: 72000, cost: 0, note: "" },
    { id: 2, carId: 1, type: "filter",  date: "2026-01-01", mileage: 84000, cost: 0, note: "" },
    { id: 3, carId: 1, type: "battery", date: "2025-02-01", mileage: 78000, cost: 0, note: "" },
    { id: 4, carId: 1, type: "tire",    date: "2025-11-01", mileage: 86000, cost: 0, note: "" },
    { id: 5, carId: 1, type: "wiper",   date: "2025-12-01", mileage: 86000, cost: 0, note: "" },
    { id: 6, carId: 1, type: "oil",     date: "2025-10-01", oilDate: "2025-10", mileage: 84000, cost: 0, note: "" },
  ],
  nextId: 3,
  nextRecordId: 10,
  customMaints: [
    { id: "cm_wash_1", carId: 1, label: "洗車", lastDate: null, lastMileage: null, intervalKm: null, intervalMonths: null },
    { id: "cm_wash_2", carId: 2, label: "洗車", lastDate: null, lastMileage: null, intervalKm: null, intervalMonths: null },
  ],
};

const MAINTENANCE_TYPES = [
  { id: "oil",        label: "オイル交換" },
  { id: "cvt",        label: "CVTオイル" },
  { id: "tire",       label: "タイヤ交換" },
  { id: "brake",      label: "ブレーキ点検" },
  { id: "battery",    label: "バッテリー" },
  { id: "filter",     label: "エアコンフィルター" },
  { id: "wiper",      label: "ワイパー" },
  { id: "inspection", label: "車検" },
  { id: "other",      label: "その他" },
];

const DEFAULT_INTERVALS = {
  cvt: 40000, tire: 40000, brake: 20000, battery: 50000, filter: 15000,
};

const CAR_COLORS = ["#2563eb","#16a34a","#dc2626","#9333ea","#ea580c","#0891b2","#be185d","#65a30d"];

function useStorage() {
  const [data, setData] = useState(initialData);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        const mergedCars = (saved.cars || []).map(c => {
          const init = initialData.cars.find(ic => ic.id === c.id);
          return { ...(init||{}), ...c };
        });
        setData({ ...initialData, ...saved, cars: mergedCars });
      }
    } catch(err) { console.error(err); }
  }, []);
  const save = (d) => {
    setData(d);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(err) {}
  };
  return [data, save];
}

function fmtYM(dateStr) {
  if (!dateStr) return "";
  const s = dateStr.slice(0,7);
  const parts = s.split("-");
  return parts[0] + "年" + parseInt(parts[1]) + "月";
}

function addMonths(dateStr, m) {
  const d = new Date(dateStr + "-01");
  d.setMonth(d.getMonth() + m);
  return d.getFullYear() + "年" + (d.getMonth()+1) + "月";
}

function isOverdue(dateStr, m) {
  const d = new Date(dateStr + "-01");
  d.setMonth(d.getMonth() + m);
  return d < new Date();
}

function addOneYear(dateStr) {
  const d = new Date(dateStr);
  d.setFullYear(d.getFullYear() + 1);
  return d.getFullYear() + "年" + (d.getMonth()+1) + "月";
}

function getReminders(car, recs) {
  if (!car) return [];
  return MAINTENANCE_TYPES.map(m => {
    if (m.id === "oil") {
      const oilRecs = recs.filter(r => r.type === "oil").sort((a,b) => b.mileage - a.mileage);
      const lastOil = oilRecs[0];
      if (!lastOil) return null;
      const lastMileage = lastOil.mileage;
      const lastDate = lastOil.oilDate || lastOil.date.slice(0,7);
      const interval = car.oilInterval > 0 ? car.oilInterval : 6000;
      const nextKm = Math.floor((lastMileage + interval) / 1000) * 1000;
      const kmRemain = nextKm - (car.mileage || 0);
      const kmOver = kmRemain <= 0;
      const usesDate = car.id === 1;
      const nextMonth = usesDate ? addMonths(lastDate, 6) : null;
      const dateOver = usesDate ? isOverdue(lastDate, 6) : false;
      const overdue = kmOver || (usesDate && dateOver);
      const lastNote = lastOil.note || "";
      const elementDue = lastNote.includes("エレメント交換あり");
      let rotationDue = false;
      if (oilRecs.length > 0) {
        rotationDue = car.id === 1 ? true : lastNote.includes("ローテーションあり");
      }
      return { ...m, lastDate, lastMileage, nextKm, kmRemain, nextMonth, dateOver, kmOver, overdue, isOil: true, usesDate, elementDue, rotationDue, remaining: overdue ? -1 : kmRemain };
    }
    if (["filter","wiper"].includes(m.id)) {
      const last = recs.filter(r => r.type === m.id).sort((a,b) => b.date.localeCompare(a.date))[0];
      if (!last) return null;
      const expiry = new Date(last.date);
      expiry.setFullYear(expiry.getFullYear() + 1);
      const overdue = expiry < new Date();
      return { ...m, lastDate: last.date, nextDate: addOneYear(last.date), overdue, isDateBased: true, remaining: overdue ? -1 : 1 };
    }
    const interval = DEFAULT_INTERVALS[m.id];
    if (!interval) return null;
    const last = recs.filter(r => r.type === m.id).sort((a,b) => b.mileage - a.mileage)[0];
    const nextKm = last ? last.mileage + interval : (car.mileage||0) + interval;
    const remaining = nextKm - (car.mileage||0);
    return { ...m, lastDate: last?.date || null, lastMileageVal: last?.mileage || null, nextKm, remaining, isDateBased: false, overdue: remaining <= 0 };
  }).filter(Boolean).sort((a,b) => a.remaining - b.remaining);
}

function getCustomReminders(car, data) {
  if (!car) return [];
  return (data.customMaints || []).filter(cm => cm.carId === car.id).map(cm => {
    const nextKm = (cm.lastMileage != null && cm.intervalKm) ? cm.lastMileage + cm.intervalKm : null;
    const kmOver = nextKm != null ? nextKm - (car.mileage||0) <= 0 : false;
    const nextMonth = (cm.lastDate && cm.intervalMonths) ? addMonths(cm.lastDate, cm.intervalMonths) : null;
    const dateOver = (cm.lastDate && cm.intervalMonths) ? (() => { const d = new Date(cm.lastDate+"-01"); d.setMonth(d.getMonth()+cm.intervalMonths); return d < new Date(); })() : false;
    const overdue = kmOver || dateOver;
    return { ...cm, isCustom: true, nextKm, nextMonth, kmOver, dateOver, overdue, remaining: overdue ? -1 : (nextKm ? nextKm-(car.mileage||0) : 999999) };
  });
}

// --- UI Components ---

function Modal({ onClose, children }) {
  return e("div", { className: "modal-bg", onClick: onClose },
    e("div", { className: "modal-box", onClick: ev => ev.stopPropagation() }, children)
  );
}

function Input({ label, type, value, onChange, placeholder }) {
  return e("div", { style: { marginBottom: 10 } },
    e("label", { className: "lbl" }, label),
    e("input", { className: "inp", type: type||"text", value: value||"", onChange, placeholder: placeholder||"" })
  );
}

function CarForm({ car, setCar, onSubmit, onCancel, submitLabel }) {
  return e("div", null,
    e("div", { style: { marginBottom: 14 } },
      e("label", { className: "lbl" }, "カラー"),
      e("div", { style: { display:"flex", gap:8 } },
        CAR_COLORS.map(col =>
          e("button", {
            key: col,
            onClick: () => setCar({ ...car, color: col }),
            style: { width:26, height:26, background:col, border: car.color===col?"3px solid white":"3px solid transparent", borderRadius:"50%", cursor:"pointer" }
          })
        )
      )
    ),
    [["name","ニックネーム *","例: セレナ",false],["maker","メーカー","例: Nissan",false],["model","モデル","例: Serena",false],["year","年式","2020",true],["mileage","現在の走行距離 (km)","例: 86000",true]].map(([k,l,p,num]) =>
      e(Input, { key:k, label:l, type:num?"number":"text", value:car[k]||"", placeholder:p, onChange:ev=>setCar({...car,[k]:ev.target.value}) })
    ),
    e("div", { style:{display:"flex",gap:10,marginBottom:10} },
      e("div", { style:{flex:1} },
        e("label", { className:"lbl" }, "オイル交換周期 (km)"),
        e("input", { className:"inp", type:"number", value:car.oilInterval||"", placeholder:"例: 6000", onChange:ev=>setCar({...car,oilInterval:Number(ev.target.value)||0}) })
      ),
      e("div", { style:{flex:1} },
        e("label", { className:"lbl" }, "オイル種類"),
        e("input", { className:"inp", type:"text", value:car.oilType||"", placeholder:"例: 0W20", onChange:ev=>setCar({...car,oilType:ev.target.value}) })
      )
    ),
    e("div", { style:{borderTop:"1px solid #1e3a5f",margin:"12px 0",paddingTop:12} },
      e("div", { style:{color:"#38bdf8",fontSize:11,marginBottom:10} }, "車検証情報"),
      [["shakenExpiry","車検有効期限"],["jibaishaExpiry","自賠責保険の期限"],["firstReg","初年度登録年月"]].map(([k,l]) =>
        e("div", { key:k, style:{marginBottom:10} },
          e("label", { className:"lbl" }, l),
          e("input", { className:"inp", type:"month", value:(car[k]||"").slice(0,7), onChange:ev=>setCar({...car,[k]:ev.target.value}) })
        )
      ),
      e(Input, { label:"型式", value:car.carType||"", placeholder:"例: C27", onChange:ev=>setCar({...car,carType:ev.target.value}) }),
      e(Input, { label:"車台番号", value:car.chassisNo||"", placeholder:"例: C27-000001", onChange:ev=>setCar({...car,chassisNo:ev.target.value}) })
    ),
    e("div", { style:{display:"flex",gap:10,marginTop:14} },
      e("button", { className:"btn-g", style:{flex:1}, onClick:onCancel }, "キャンセル"),
      e("button", { className:"btn-p", style:{flex:2}, onClick:onSubmit }, submitLabel)
    )
  );
}

function App() {
  const [data, save] = useStorage();
  const [selId, setSelId] = useState(1);
  const [showRec, setShowRec] = useState(false);
  const [showMgr, setShowMgr] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showAddMaint, setShowAddMaint] = useState(false);
  const [editMaint, setEditMaint] = useState(null);
  const [editCar, setEditCar] = useState(null);
  const [rec, setRec] = useState({ type:"oil", date:new Date().toISOString().slice(0,10), mileage:"", cost:"", note:"", oilDate:"" });
  const [newCar, setNewCar] = useState({ name:"", maker:"", model:"", year:new Date().getFullYear(), mileage:"", color:"#2563eb", oilInterval:5000, oilType:"", shakenExpiry:"", jibaishaExpiry:"", firstReg:"", carType:"", chassisNo:"" });
  const [newMaint, setNewMaint] = useState({ label:"", lastDate:"", lastMileage:"", intervalKm:"", intervalMonths:"" });

  const car = data.cars.find(c => c.id === selId) || data.cars[0] || null;
  const recs = data.records.filter(r => r.carId === (car?.id || selId)).sort((a,b) => b.date.localeCompare(a.date));
  const reminders = getReminders(car, recs);
  const customReminders = getCustomReminders(car, data);
  const allReminders = [...reminders, ...customReminders];
  const urgentCnt = allReminders.filter(r => r.overdue).length;

  const saveEditMaint = () => {
    if (!editMaint) return;
    if (editMaint.isCustom) {
      save({ ...data, customMaints:(data.customMaints||[]).map(cm =>
        cm.id===editMaint.id ? {...cm, lastDate:editMaint.editDate||null, lastMileage:editMaint.editMileage?Number(editMaint.editMileage):null} : cm
      )});
    } else {
      const mileageVal = editMaint.editMileage ? Number(editMaint.editMileage) : 0;
      const dateVal = editMaint.editDate ? editMaint.editDate+"-01" : new Date().toISOString().slice(0,10);
      const noteArr = [editMaint.editElementDone?"エレメント交換あり":"", editMaint.editRotationDone?"ローテーションあり":""].filter(Boolean);
      const newRec = { id:data.nextRecordId, carId:car.id, type:editMaint.id, date:dateVal, oilDate:editMaint.id==="oil"?(editMaint.editDate||null):undefined, mileage:mileageVal, cost:0, note:noteArr.join(" ") };
      let upd = { ...data, records:[...data.records,newRec], nextRecordId:data.nextRecordId+1 };
      if (editMaint.isOil && editMaint.editInterval && Number(editMaint.editInterval)!==car.oilInterval) {
        upd.cars = upd.cars.map(c => c.id===car.id ? {...c,oilInterval:Number(editMaint.editInterval)} : c);
      }
      if (mileageVal > (car.mileage||0)) upd.cars = (upd.cars||data.cars).map(c => c.id===car.id ? {...c,mileage:mileageVal} : c);
      save(upd);
    }
    setEditMaint(null);
  };

  const addRecord = () => {
    if (!rec.mileage || !car) return;
    if (rec.type==="oil" && !rec.oilDate) return;
    const r = {...rec, id:data.nextRecordId, carId:car.id, cost:Number(rec.cost)||0, mileage:Number(rec.mileage)};
    const upd = {...data, records:[...data.records,r], nextRecordId:data.nextRecordId+1};
    if (r.mileage>(car.mileage||0)) upd.cars=data.cars.map(c=>c.id===car.id?{...c,mileage:r.mileage}:c);
    save(upd); setShowRec(false);
    setRec({type:"oil",date:new Date().toISOString().slice(0,10),mileage:"",cost:"",note:"",oilDate:""});
  };

  const addCar = () => {
    if (!newCar.name.trim()) return;
    const c = {...newCar,id:data.nextId,mileage:Number(newCar.mileage)||0};
    save({...data,cars:[...data.cars,c],nextId:data.nextId+1});
    setSelId(c.id); setShowAdd(false);
    setNewCar({name:"",maker:"",model:"",year:new Date().getFullYear(),mileage:"",color:"#2563eb",oilInterval:5000,oilType:"",shakenExpiry:"",jibaishaExpiry:"",firstReg:"",carType:"",chassisNo:""});
  };

  const updateCar = () => {
    if (!editCar?.name.trim()) return;
    save({...data,cars:data.cars.map(c=>c.id===editCar.id?{...editCar,mileage:Number(editCar.mileage)||0}:c)});
    setEditCar(null);
  };

  const deleteCar = (id) => {
    if (data.cars.length<=1) return;
    const upd = {...data,cars:data.cars.filter(c=>c.id!==id),records:data.records.filter(r=>r.carId!==id)};
    save(upd); if(selId===id) setSelId(upd.cars[0]?.id||0);
  };

  const addCustomMaint = () => {
    if (!newMaint.label.trim()) return;
    const cm = {id:"cm_"+Date.now(),carId:car.id,label:newMaint.label.trim(),lastDate:newMaint.lastDate||null,lastMileage:newMaint.lastMileage?Number(newMaint.lastMileage):null,intervalKm:newMaint.intervalKm?Number(newMaint.intervalKm):null,intervalMonths:newMaint.intervalMonths?Number(newMaint.intervalMonths):null};
    save({...data,customMaints:[...(data.customMaints||[]),cm]});
    setShowAddMaint(false);
    setNewMaint({label:"",lastDate:"",lastMileage:"",intervalKm:"",intervalMonths:""});
  };

  const deleteCustomMaint = (id) => save({...data,customMaints:(data.customMaints||[]).filter(cm=>cm.id!==id)});

  // --- RENDER ---
  return e("div", { style:{minHeight:"100vh"} },

    // ヘッダー
    e("div", { style:{background:"linear-gradient(135deg,#0a1628,#0f2040)",borderBottom:"1px solid #1e3a5f",padding:"12px 14px"} },
      e("div", { style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12} },
        e("div", { style:{fontSize:18,fontWeight:700,color:"#38bdf8"} }, "メンテナンス"),
        e("button", { className:"btn-g", style:{fontSize:12,padding:"6px 12px"}, onClick:()=>setShowMgr(true) }, "車両管理")
      ),
      e("div", { style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:2} },
        ...data.cars.map(c =>
          e("button", {
            key: c.id,
            onClick: () => setSelId(c.id),
            style: {padding:"8px 14px",borderRadius:12,border:selId===c.id?("2px solid "+c.color):"2px solid #1e3a5f",background:selId===c.id?(c.color+"22"):"#0d1f35",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontSize:13,fontWeight:600,color:selId===c.id?c.color:"#e2e8f0"}
          }, c.name)
        ),
        e("button", { onClick:()=>setShowAdd(true), style:{padding:"8px 14px",borderRadius:12,border:"2px dashed #334155",background:"transparent",cursor:"pointer",color:"#64748b",whiteSpace:"nowrap",flexShrink:0,fontSize:12} }, "追加")
      )
    ),

    // コンテンツ
    e("div", { style:{padding:14,maxWidth:480,margin:"0 auto"} },

      // 車両カード
      car && e("div", { className:"card", style:{background:"linear-gradient(135deg,"+car.color+"33,"+car.color+"11)",borderColor:car.color,marginBottom:14} },
        e("div", { style:{fontSize:20,fontWeight:700,color:"white",marginBottom:(car.shakenExpiry||car.jibaishaExpiry||car.firstReg||car.carType||car.chassisNo)?10:0} }, car.name),
        (car.shakenExpiry||car.jibaishaExpiry||car.firstReg||car.carType||car.chassisNo)
          ? e("div", { style:{borderTop:"1px solid #1e3a5f33",paddingTop:10,display:"flex",flexWrap:"wrap",gap:"8px 20px"} },
              car.firstReg && e("div", { key:"fr", style:{fontSize:12} }, e("span",{style:{color:"#64748b"}},"初年度登録: "), e("span",{style:{color:"#cbd5e1"}},fmtYM(car.firstReg))),
              car.carType && e("div", { key:"ct", style:{fontSize:12} }, e("span",{style:{color:"#64748b"}},"型式: "), e("span",{style:{color:"#cbd5e1"}},car.carType)),
              car.chassisNo && e("div", { key:"cn", style:{fontSize:12} }, e("span",{style:{color:"#64748b"}},"車台番号: "), e("span",{style:{color:"#cbd5e1"}},car.chassisNo)),
              car.shakenExpiry && e("div", { key:"se", style:{fontSize:12} }, e("span",{style:{color:"#64748b"}},"車検: "), e("span",{style:{color:new Date(car.shakenExpiry)<new Date()?"#f87171":"#cbd5e1"}},car.shakenExpiry.replace("-","年")+"月まで")),
              car.jibaishaExpiry && e("div", { key:"je", style:{fontSize:12} }, e("span",{style:{color:"#64748b"}},"自賠責: "), e("span",{style:{color:new Date(car.jibaishaExpiry)<new Date()?"#f87171":"#cbd5e1"}},car.jibaishaExpiry.replace("-","年")+"月まで"))
            )
          : e("div", { style:{color:"#475569",fontSize:12} }, "車両管理から車検証情報を入力してください")
      ),

      // メンテナンスヘッダー
      e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8} },
        e("div", { style:{color:"#64748b",fontSize:10,letterSpacing:1} }, "メンテナンス"),
        e("button", { className:"btn-g", style:{fontSize:11,padding:"4px 10px",color:"#93c5fd"}, onClick:()=>setShowAddMaint(true) }, "項目追加")
      ),

      allReminders.length===0 && e("div", { style:{color:"#475569",fontSize:13,textAlign:"center",padding:20} }, "記録がありません"),

      // 標準メンテカード
      ...reminders.map(r =>
        e("div", {
          key: r.id,
          className: "card",
          style: {padding:"11px 14px",cursor:"pointer"},
          onClick: () => setEditMaint({...r, editDate:r.lastDate?r.lastDate.slice(0,7):"", editMileage:r.isOil?(r.lastMileage||""):(r.lastMileageVal||""), editInterval:r.isOil?(car.oilInterval||""):"" })
        },
          e("div", { style:{display:"flex",alignItems:"center"} },
            e("div", { style:{flex:1} },
              e("div", { style:{fontWeight:500,fontSize:13,color:r.overdue?"#f87171":"#e2e8f0"} }, r.label),
              r.isOil
                ? e("div", { style:{fontSize:11,marginTop:3} },
                    e("div", { style:{color:"#64748b",marginBottom:3} }, "前回: "+(r.lastDate?fmtYM(r.lastDate)+" · "+r.lastMileage.toLocaleString()+"km":"未記録")),
                    e("div", { style:{display:"flex",gap:8,flexWrap:"wrap"} },
                      e("span", { style:{color:r.kmOver?"#f87171":"#38bdf8"} }, "次回 "+r.nextKm.toLocaleString()+"km"),
                      r.usesDate && r.nextMonth && e("span", { style:{color:r.dateOver?"#f87171":"#38bdf8"} }, r.nextMonth)
                    ),
                    (r.elementDue||r.rotationDue) && e("div", { style:{marginTop:4,display:"flex",gap:10} },
                      r.elementDue && e("span", { style:{color:"#fb923c",fontSize:11} }, "エレメント交換"),
                      r.rotationDue && e("span", { style:{color:"#a78bfa",fontSize:11} }, "タイヤローテーション")
                    )
                  )
                : e("div", { style:{fontSize:11,color:"#64748b",marginTop:1} },
                    r.isDateBased
                      ? (r.lastDate ? "前回: "+r.lastDate+" · 次回: "+r.nextDate : "未記録")
                      : (r.lastDate ? "前回: "+r.lastDate+(r.lastMileageVal?" · "+r.lastMileageVal.toLocaleString()+"km":"") : "未記録")
                  )
            ),
            r.overdue && e("div", { style:{fontSize:12,fontWeight:600,color:"#f87171",flexShrink:0,marginLeft:8} }, "要対応")
          )
        )
      ),

      // カスタムメンテカード
      ...customReminders.map(r =>
        e("div", { key:r.id, className:"card", style:{padding:"11px 14px"} },
          e("div", { style:{display:"flex",alignItems:"center"} },
            e("div", { style:{flex:1,cursor:"pointer"}, onClick:()=>setEditMaint({...r,editDate:r.lastDate?r.lastDate.slice(0,7):"",editMileage:r.lastMileage||""}) },
              e("div", { style:{fontWeight:500,fontSize:13,color:r.overdue?"#f87171":"#e2e8f0"} }, r.label),
              e("div", { style:{fontSize:11,color:"#64748b",marginTop:2} },
                (r.lastDate||r.lastMileage)
                  ? "前回: "+(r.lastDate?fmtYM(r.lastDate):"")+(r.lastDate&&r.lastMileage?" · ":"")+(r.lastMileage?r.lastMileage.toLocaleString()+"km":"")
                  : "未記録"
              )
            ),
            e("div", { style:{display:"flex",alignItems:"center",gap:6,flexShrink:0} },
              r.overdue && e("div", { style:{fontSize:12,fontWeight:600,color:"#f87171"} }, "要対応"),
              (!r.intervalKm && !r.intervalMonths) && e("button", {
                onClick: () => {
                  const today = new Date().toISOString().slice(0,7);
                  save({...data,customMaints:(data.customMaints||[]).map(cm=>cm.id===r.id?{...cm,lastDate:today}:cm)});
                },
                style: {background:"#1e3a5f",border:"1px solid #2563eb",color:"#93c5fd",borderRadius:8,padding:"4px 8px",fontSize:11,cursor:"pointer"}
              }, "今日記録"),
              e("button", { onClick:()=>deleteCustomMaint(r.id), style:{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:13,padding:"4px"} }, "削")
            )
          )
        )
      ),

      // 記録ボタン
      e("button", { className:"btn-p", style:{width:"100%",marginTop:6,padding:"12px",fontSize:14,borderRadius:12}, onClick:()=>setShowRec(true) }, "メンテナンスを記録")
    ),

    // --- モーダル ---

    // 記録モーダル
    showRec && e(Modal, { onClose:()=>setShowRec(false) },
      e("h3", { style:{margin:"0 0 16px",fontSize:15} }, car?.name+" のメンテナンスを記録"),
      e("div", { style:{marginBottom:10} },
        e("label", { className:"lbl" }, "種類"),
        e("select", { className:"sel", value:rec.type, onChange:ev=>setRec({...rec,type:ev.target.value}) },
          MAINTENANCE_TYPES.map(m => e("option", { key:m.id, value:m.id }, m.label))
        )
      ),
      rec.type==="oil"
        ? e("div", null,
            e(Input, { label:"交換した走行距離 (km) *", type:"number", value:rec.mileage, placeholder:car?.mileage?.toString()||"", onChange:ev=>setRec({...rec,mileage:ev.target.value}) }),
            e(Input, { label:"交換した月 *", type:"month", value:rec.oilDate, onChange:ev=>setRec({...rec,oilDate:ev.target.value,date:ev.target.value+"-01"}) }),
            e(Input, { label:"費用 (円)", type:"number", value:rec.cost, placeholder:"例: 3500", onChange:ev=>setRec({...rec,cost:ev.target.value}) }),
            e(Input, { label:"メモ", value:rec.note, onChange:ev=>setRec({...rec,note:ev.target.value}) })
          )
        : e("div", null,
            e(Input, { label:"日付", type:"date", value:rec.date, onChange:ev=>setRec({...rec,date:ev.target.value}) }),
            e(Input, { label:"走行距離 (km) *", type:"number", value:rec.mileage, placeholder:car?.mileage?.toString()||"", onChange:ev=>setRec({...rec,mileage:ev.target.value}) }),
            e(Input, { label:"費用 (円)", type:"number", value:rec.cost, placeholder:"例: 3500", onChange:ev=>setRec({...rec,cost:ev.target.value}) }),
            e(Input, { label:"メモ", value:rec.note, onChange:ev=>setRec({...rec,note:ev.target.value}) })
          ),
      e("div", { style:{display:"flex",gap:10,marginTop:14} },
        e("button", { className:"btn-g", style:{flex:1}, onClick:()=>setShowRec(false) }, "キャンセル"),
        e("button", { className:"btn-p", style:{flex:2}, onClick:addRecord }, "保存")
      )
    ),

    // 車両管理モーダル
    showMgr && e(Modal, { onClose:()=>setShowMgr(false) },
      e("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16} },
        e("h3", { style:{margin:0,fontSize:15} }, "車両管理"),
        e("button", { className:"btn-p", onClick:()=>{setShowAdd(true);setShowMgr(false);} }, "新しい車を追加")
      ),
      ...data.cars.map(c =>
        e("div", { key:c.id, style:{background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:12,padding:14,marginBottom:8} },
          editCar?.id===c.id
            ? e(CarForm, { car:editCar, setCar:setEditCar, onSubmit:updateCar, onCancel:()=>setEditCar(null), submitLabel:"更新" })
            : e("div", { style:{display:"flex",alignItems:"center",gap:10} },
                e("div", { style:{flex:1} },
                  e("div", { style:{fontWeight:600,fontSize:13,color:c.color} }, c.name),
                  e("div", { style:{color:"#64748b",fontSize:11} }, c.maker+" "+c.model+" · "+c.year+"年式 · "+c.mileage.toLocaleString()+"km"),
                  c.oilInterval>0 && e("div", { style:{color:"#475569",fontSize:10,marginTop:2} }, "オイル: "+c.oilInterval.toLocaleString()+"kmごと"+(c.oilType?" ("+c.oilType+")":""))
                ),
                e("div", { style:{display:"flex",gap:6} },
                  e("button", { className:"btn-g", onClick:()=>setEditCar({...c}) }, "編集"),
                  data.cars.length>1 && e("button", { className:"btn-d", onClick:()=>deleteCar(c.id) }, "削除")
                )
              )
        )
      ),
      e("button", { className:"btn-g", style:{width:"100%",marginTop:4}, onClick:()=>setShowMgr(false) }, "閉じる")
    ),

    // 車追加モーダル
    showAdd && e(Modal, { onClose:()=>setShowAdd(false) },
      e("h3", { style:{margin:"0 0 16px",fontSize:15} }, "新しい車を追加"),
      e(CarForm, { car:newCar, setCar:setNewCar, onSubmit:addCar, onCancel:()=>setShowAdd(false), submitLabel:"追加" })
    ),

    // 項目追加モーダル
    showAddMaint && e(Modal, { onClose:()=>setShowAddMaint(false) },
      e("h3", { style:{margin:"0 0 4px",fontSize:15} }, "メンテナンス項目を追加"),
      e("div", { style:{color:"#64748b",fontSize:11,marginBottom:16} }, car?.name+" に追加されます"),
      e(Input, { label:"項目名 *", value:newMaint.label, placeholder:"例: スパークプラグ交換", onChange:ev=>setNewMaint({...newMaint,label:ev.target.value}) }),
      e("div", { style:{borderTop:"1px solid #1e3a5f",margin:"12px 0",paddingTop:12} },
        e("div", { style:{color:"#38bdf8",fontSize:11,marginBottom:10} }, "前回の交換"),
        e("div", { style:{display:"flex",gap:10,marginBottom:10} },
          e("div", { style:{flex:1} },
            e("label", { className:"lbl" }, "年月"),
            e("input", { className:"inp", type:"month", value:(newMaint.lastDate||"").slice(0,7), onChange:ev=>setNewMaint({...newMaint,lastDate:ev.target.value}) })
          ),
          e("div", { style:{flex:1} },
            e("label", { className:"lbl" }, "走行距離 (km)"),
            e("input", { className:"inp", type:"number", value:newMaint.lastMileage||"", placeholder:"例: 80000", onChange:ev=>setNewMaint({...newMaint,lastMileage:ev.target.value}) })
          )
        )
      ),
      e("div", { style:{borderTop:"1px solid #1e3a5f",margin:"0 0 12px",paddingTop:12} },
        e("div", { style:{color:"#38bdf8",fontSize:11,marginBottom:10} }, "次回の目安"),
        e("div", { style:{display:"flex",gap:10} },
          e("div", { style:{flex:1} },
            e("label", { className:"lbl" }, "交換周期 (km)"),
            e("input", { className:"inp", type:"number", value:newMaint.intervalKm||"", placeholder:"例: 30000", onChange:ev=>setNewMaint({...newMaint,intervalKm:ev.target.value}) })
          ),
          e("div", { style:{flex:1} },
            e("label", { className:"lbl" }, "交換周期 (ヶ月)"),
            e("input", { className:"inp", type:"number", value:newMaint.intervalMonths||"", placeholder:"例: 12", onChange:ev=>setNewMaint({...newMaint,intervalMonths:ev.target.value}) })
          )
        )
      ),
      e("div", { style:{display:"flex",gap:10,marginTop:4} },
        e("button", { className:"btn-g", style:{flex:1}, onClick:()=>setShowAddMaint(false) }, "キャンセル"),
        e("button", { className:"btn-p", style:{flex:2}, onClick:addCustomMaint }, "追加")
      )
    ),

    // 手入力モーダル
    editMaint && e(Modal, { onClose:()=>setEditMaint(null) },
      e("h3", { style:{margin:"0 0 4px",fontSize:15} }, editMaint.label),
      e("div", { style:{color:"#64748b",fontSize:11,marginBottom:16} }, "前回の情報を入力してください"),
      editMaint.isOil
        ? e("div", null,
            e(Input, { label:"交換した走行距離 (km) *", type:"number", value:editMaint.editMileage||"", placeholder:"例: 84000", onChange:ev=>setEditMaint({...editMaint,editMileage:ev.target.value}) }),
            editMaint.usesDate && e(Input, { label:"交換した月", type:"month", value:editMaint.editDate||"", onChange:ev=>setEditMaint({...editMaint,editDate:ev.target.value}) }),
            e(Input, { label:"交換インターバル (km)", type:"number", value:editMaint.editInterval||"", placeholder:"例: 6000", onChange:ev=>setEditMaint({...editMaint,editInterval:ev.target.value}) }),
            e("div", { style:{marginBottom:10,display:"flex",alignItems:"center",gap:10,background:"#1e293b",borderRadius:10,padding:"10px 14px"} },
              e("input", { type:"checkbox", id:"elementCheck", checked:editMaint.editElementDone||false, onChange:ev=>setEditMaint({...editMaint,editElementDone:ev.target.checked}), style:{width:18,height:18,cursor:"pointer"} }),
              e("label", { htmlFor:"elementCheck", style:{color:"#e2e8f0",fontSize:13,cursor:"pointer"} }, "今回エレメントも交換した")
            ),
            e("div", { style:{marginBottom:16,display:"flex",alignItems:"center",gap:10,background:"#1e293b",borderRadius:10,padding:"10px 14px"} },
              e("input", { type:"checkbox", id:"rotationCheck", checked:editMaint.editRotationDone||false, onChange:ev=>setEditMaint({...editMaint,editRotationDone:ev.target.checked}), style:{width:18,height:18,cursor:"pointer"} }),
              e("label", { htmlFor:"rotationCheck", style:{color:"#e2e8f0",fontSize:13,cursor:"pointer"} }, "今回タイヤローテーションもした")
            )
          )
        : e("div", null,
            e(Input, { label:"交換・点検した月", type:"month", value:editMaint.editDate||"", onChange:ev=>setEditMaint({...editMaint,editDate:ev.target.value}) }),
            e(Input, { label:"そのときの走行距離 (km)", type:"number", value:editMaint.editMileage||"", placeholder:"例: 84000", onChange:ev=>setEditMaint({...editMaint,editMileage:ev.target.value}) })
          ),
      e("div", { style:{display:"flex",gap:10} },
        e("button", { className:"btn-g", style:{flex:1}, onClick:()=>setEditMaint(null) }, "キャンセル"),
        e("button", { className:"btn-p", style:{flex:2}, onClick:saveEditMaint }, "保存")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
