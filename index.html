<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メンテナンス</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060d1a; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; color: #e2e8f0; }
    input[type="month"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-box { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }
    .card { background: #0d1f35; border: 1px solid #1e3a5f; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .card.dragging { opacity: 0.4; }
    .card.drag-over { border-color: #2563eb; background: #0d2a5f; }
    .inp { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 9px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; font-family: inherit; }
    .sel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 9px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; font-family: inherit; }
    .lbl { color: #64748b; font-size: 11px; margin-bottom: 4px; display: block; }
    .btn-p { background: #2563eb; border: none; color: white; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit; }
    .btn-g { background: transparent; border: 1px solid #334155; color: white; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-d { background: #450a0a; border: 1px solid #7f1d1d; color: #f87171; border-radius: 10px; padding: 9px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .drag-handle { cursor: grab; color: #334155; font-size: 18px; padding: 0 6px; user-select: none; touch-action: none; }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useEffect, useRef } = React;

const STORAGE_KEY = "maintenance_app_v1";

const initialData = {
  // 車タブ
  cars: [
    { id: 1, name: "セレナ", maker: "Nissan", model: "Serena", year: 2020, mileage: 86000, color: "#2563eb", oilInterval: 6000, oilType: "0W20", shakenExpiry: "", jibaishaExpiry: "", firstReg: "", carType: "", chassisNo: "" },
    { id: 2, name: "エブリィワゴン", maker: "Suzuki", model: "Every Wagon", year: 2025, mileage: 0, color: "#16a34a", oilInterval: 3000, oilType: "5W30", shakenExpiry: "", jibaishaExpiry: "", firstReg: "", carType: "", chassisNo: "" },
  ],
  records: [
    { id: 1, carId: 1, type: "cvt",     date: "2024-09-01", mileage: 72000, cost: 0, note: "" },
    { id: 2, carId: 1, type: "filter",  date: "2026-01-01", mileage: 84000, cost: 0, note: "" },
    { id: 3, carId: 1, type: "battery", date: "2025-02-01", mileage: 78000, cost: 0, note: "" },
    { id: 4, carId: 1, type: "tire",    date: "2025-11-01", mileage: 86000, cost: 0, note: "" },
    { id: 5, carId: 1, type: "wiper",   date: "2025-12-01", mileage: 86000, cost: 0, note: "" },
    { id: 6, carId: 1, type: "oil",     date: "2025-10-01", oilDate: "2025-10", mileage: 84000, cost: 0, note: "" },
  ],
  nextCarId: 3,
  nextRecordId: 10,
  carCustomMaints: [
    { id: "cm_wash_1", carId: 1, label: "洗車", lastDate: null, lastMileage: null, intervalKm: null, intervalMonths: null },
    { id: "cm_wash_2", carId: 2, label: "洗車", lastDate: null, lastMileage: null, intervalKm: null, intervalMonths: null },
  ],
  carItemOrders: {
    1: ["oil","cvt","tire","brake","battery","filter","wiper","inspection","other","cm_wash_1"],
    2: ["oil","cvt","tire","brake","battery","filter","wiper","inspection","other","cm_wash_2"],
  },
  // 家タブ
  homeItems: [
    { id: "h1", label: "浄水器フィルター", lastDate: null, intervalMonths: 12, note: "" },
    { id: "h2", label: "生ごみ乾燥機フィルター", lastDate: null, intervalMonths: 6, note: "" },
  ],
  homeOrder: ["h1","h2"],
  nextHomeId: 3,
};

const CAR_TYPES = [
  { id: "oil",        label: "オイル交換" },
  { id: "cvt",        label: "CVTオイル" },
  { id: "tire",       label: "タイヤ交換" },
  { id: "brake",      label: "ブレーキ点検" },
  { id: "battery",    label: "バッテリー" },
  { id: "filter",     label: "エアコンフィルター" },
  { id: "wiper",      label: "ワイパー" },
  { id: "inspection", label: "車検" },
  { id: "other",      label: "その他" },
];

const CAR_INTERVALS = { cvt:40000, tire:40000, brake:20000, battery:50000, filter:15000 };
const CAR_COLORS = ["#2563eb","#16a34a","#dc2626","#9333ea","#ea580c","#0891b2","#be185d","#65a30d"];

// ── ストレージ ──
function useStorage() {
  const [data, setData] = useState(initialData);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        const mergedCars = (saved.cars||[]).map(c => ({ ...(initialData.cars.find(ic=>ic.id===c.id)||{}), ...c }));
        setData({ ...initialData, ...saved, cars: mergedCars });
      }
    } catch(err) {}
  }, []);
  const save = (d) => { setData(d); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(err) {} };
  return [data, save];
}

// ── ユーティリティ ──
function fmtYM(s) {
  if (!s) return "";
  const p = s.slice(0,7).split("-");
  return p[0]+"年"+parseInt(p[1])+"月";
}
function addMonths(s, m) {
  const d = new Date((s.length===7?s+"-01":s));
  d.setMonth(d.getMonth()+m);
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月";
}
function isOverdue(s, m) {
  const d = new Date((s.length===7?s+"-01":s));
  d.setMonth(d.getMonth()+m);
  return d < new Date();
}
function addOneYear(s) {
  const d = new Date(s);
  d.setFullYear(d.getFullYear()+1);
  return d.getFullYear()+"年"+(d.getMonth()+1)+"月";
}

// ── 車リマインダー計算 ──
function getCarReminders(car, recs) {
  if (!car) return [];
  return CAR_TYPES.map(m => {
    if (m.id === "oil") {
      const oilRecs = recs.filter(r=>r.type==="oil").sort((a,b)=>b.mileage-a.mileage);
      const last = oilRecs[0];
      if (!last) return { ...m, lastDate:null, lastMileage:null, nextKm:null, nextMonth:null, kmOver:false, dateOver:false, overdue:false, isOil:true, usesDate:car.id===1, elementDue:false, rotationDue:false, remaining:999999 };
      const interval = car.oilInterval>0?car.oilInterval:6000;
      const nextKm = Math.floor((last.mileage+interval)/1000)*1000;
      const kmRemain = nextKm-(car.mileage||0);
      const kmOver = kmRemain<=0;
      const usesDate = car.id===1;
      const lastDate = last.oilDate||last.date.slice(0,7);
      const nextMonth = usesDate?addMonths(lastDate,6):null;
      const dateOver = usesDate?isOverdue(lastDate,6):false;
      const overdue = kmOver||(usesDate&&dateOver);
      const note = last.note||"";
      const elementDue = note.includes("エレメント交換あり");
      const rotationDue = oilRecs.length>0?(car.id===1?true:note.includes("ローテーションあり")):false;
      return { ...m, lastDate, lastMileage:last.mileage, nextKm, kmRemain, nextMonth, dateOver, kmOver, overdue, isOil:true, usesDate, elementDue, rotationDue, remaining:overdue?-1:kmRemain };
    }
    if (["filter","wiper"].includes(m.id)) {
      const last = recs.filter(r=>r.type===m.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
      if (!last) return null;
      const expiry = new Date(last.date); expiry.setFullYear(expiry.getFullYear()+1);
      const overdue = expiry<new Date();
      return { ...m, lastDate:last.date, nextDate:addOneYear(last.date), overdue, isDateBased:true, remaining:overdue?-1:1 };
    }
    const interval = CAR_INTERVALS[m.id];
    if (!interval) return null;
    const last = recs.filter(r=>r.type===m.id).sort((a,b)=>b.mileage-a.mileage)[0];
    const nextKm = last?last.mileage+interval:(car.mileage||0)+interval;
    const remaining = nextKm-(car.mileage||0);
    return { ...m, lastDate:last?.date||null, lastMileageVal:last?.mileage||null, nextKm, remaining, isDateBased:false, overdue:remaining<=0 };
  }).filter(Boolean);
}

function getCarCustomReminders(car, data) {
  if (!car) return [];
  return (data.carCustomMaints||[]).filter(cm=>cm.carId===car.id).map(cm=>{
    const nextKm=(cm.lastMileage!=null&&cm.intervalKm)?cm.lastMileage+cm.intervalKm:null;
    const kmOver=nextKm!=null?nextKm-(car.mileage||0)<=0:false;
    const nextMonth=(cm.lastDate&&cm.intervalMonths)?addMonths(cm.lastDate,cm.intervalMonths):null;
    const dateOver=(cm.lastDate&&cm.intervalMonths)?(()=>{const d=new Date(cm.lastDate+"-01");d.setMonth(d.getMonth()+cm.intervalMonths);return d<new Date();})():false;
    const overdue=kmOver||dateOver;
    return {...cm,isCustom:true,nextKm,nextMonth,kmOver,dateOver,overdue,remaining:overdue?-1:(nextKm?nextKm-(car.mileage||0):999999)};
  });
}

// ── ドラッグ＆ドロップ Hook ──
function useDragSort(items, onReorder) {
  const dragIdx = useRef(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const onDragStart = (idx) => { dragIdx.current = idx; };
  const onDragOver = (idx) => {
    if (dragIdx.current === null || dragIdx.current === idx) return;
    setDragOverIdx(idx);
  };
  const onDrop = (idx) => {
    if (dragIdx.current === null || dragIdx.current === idx) { dragIdx.current=null; setDragOverIdx(null); return; }
    const newItems = [...items];
    const [moved] = newItems.splice(dragIdx.current, 1);
    newItems.splice(idx, 0, moved);
    onReorder(newItems.map(i=>i.id));
    dragIdx.current = null;
    setDragOverIdx(null);
  };
  const onDragEnd = () => { dragIdx.current=null; setDragOverIdx(null); };

  // タッチ対応
  const touchStart = useRef(null);
  const onTouchStart = (idx, ev) => {
    touchStart.current = { idx, y: ev.touches[0].clientY };
    dragIdx.current = idx;
  };
  const onTouchMove = (ev) => {
    if (dragIdx.current===null) return;
    ev.preventDefault();
    const y = ev.touches[0].clientY;
    const els = document.querySelectorAll(".drag-card");
    els.forEach((el, i) => {
      const rect = el.getBoundingClientRect();
      if (y >= rect.top && y <= rect.bottom) setDragOverIdx(i);
    });
  };
  const onTouchEnd = () => {
    if (dragIdx.current!==null && dragOverIdx!==null && dragIdx.current!==dragOverIdx) {
      const newItems=[...items];
      const [moved]=newItems.splice(dragIdx.current,1);
      newItems.splice(dragOverIdx,0,moved);
      onReorder(newItems.map(i=>i.id));
    }
    dragIdx.current=null; setDragOverIdx(null);
  };

  return { dragOverIdx, onDragStart, onDragOver, onDrop, onDragEnd, onTouchStart, onTouchMove, onTouchEnd };
}

// ── モーダル ──
function Modal({ onClose, children }) {
  return e("div",{className:"modal-bg",onClick:onClose},e("div",{className:"modal-box",onClick:ev=>ev.stopPropagation()},children));
}
function Inp({ label, type, value, onChange, placeholder }) {
  return e("div",{style:{marginBottom:10}},e("label",{className:"lbl"},label),e("input",{className:"inp",type:type||"text",value:value||"",onChange,placeholder:placeholder||""}));
}

// ── CarForm ──
function CarForm({ car, setCar, onSubmit, onCancel, submitLabel }) {
  return e("div",null,
    e("div",{style:{marginBottom:14}},
      e("label",{className:"lbl"},"カラー"),
      e("div",{style:{display:"flex",gap:8}},
        CAR_COLORS.map(col=>e("button",{key:col,onClick:()=>setCar({...car,color:col}),style:{width:26,height:26,background:col,border:car.color===col?"3px solid white":"3px solid transparent",borderRadius:"50%",cursor:"pointer"}}))
      )
    ),
    [["name","ニックネーム *","例: セレナ",false],["maker","メーカー","例: Nissan",false],["model","モデル","例: Serena",false],["year","年式","2020",true],["mileage","現在の走行距離 (km)","例: 86000",true]].map(([k,l,p,num])=>
      e(Inp,{key:k,label:l,type:num?"number":"text",value:car[k]||"",placeholder:p,onChange:ev=>setCar({...car,[k]:ev.target.value})})
    ),
    e("div",{style:{display:"flex",gap:10,marginBottom:10}},
      e("div",{style:{flex:1}},e("label",{className:"lbl"},"オイル交換周期 (km)"),e("input",{className:"inp",type:"number",value:car.oilInterval||"",placeholder:"例: 6000",onChange:ev=>setCar({...car,oilInterval:Number(ev.target.value)||0})})),
      e("div",{style:{flex:1}},e("label",{className:"lbl"},"オイル種類"),e("input",{className:"inp",type:"text",value:car.oilType||"",placeholder:"例: 0W20",onChange:ev=>setCar({...car,oilType:ev.target.value})}))
    ),
    e("div",{style:{borderTop:"1px solid #1e3a5f",margin:"12px 0",paddingTop:12}},
      e("div",{style:{color:"#38bdf8",fontSize:11,marginBottom:10}},"車検証情報"),
      [["shakenExpiry","車検有効期限"],["jibaishaExpiry","自賠責保険の期限"],["firstReg","初年度登録年月"]].map(([k,l])=>
        e("div",{key:k,style:{marginBottom:10}},e("label",{className:"lbl"},l),e("input",{className:"inp",type:"month",value:(car[k]||"").slice(0,7),onChange:ev=>setCar({...car,[k]:ev.target.value})}))
      ),
      e(Inp,{label:"型式",value:car.carType||"",placeholder:"例: C27",onChange:ev=>setCar({...car,carType:ev.target.value})}),
      e(Inp,{label:"車台番号",value:car.chassisNo||"",placeholder:"例: C27-000001",onChange:ev=>setCar({...car,chassisNo:ev.target.value})})
    ),
    e("div",{style:{display:"flex",gap:10,marginTop:14}},
      e("button",{className:"btn-g",style:{flex:1},onClick:onCancel},"キャンセル"),
      e("button",{className:"btn-p",style:{flex:2},onClick:onSubmit},submitLabel)
    )
  );
}

// ── 車タブ ──
function CarTab({ data, save }) {
  const [selCarId, setSelCarId] = useState(1);
  const [showRec, setShowRec] = useState(false);
  const [showMgr, setShowMgr] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showAddMaint, setShowAddMaint] = useState(false);
  const [editMaint, setEditMaint] = useState(null);
  const [editCar, setEditCar] = useState(null);
  const [rec, setRec] = useState({type:"oil",date:new Date().toISOString().slice(0,10),mileage:"",cost:"",note:"",oilDate:""});
  const [newCar, setNewCar] = useState({name:"",maker:"",model:"",year:new Date().getFullYear(),mileage:"",color:"#2563eb",oilInterval:5000,oilType:"",shakenExpiry:"",jibaishaExpiry:"",firstReg:"",carType:"",chassisNo:""});
  const [newMaint, setNewMaint] = useState({label:"",lastDate:"",lastMileage:"",intervalKm:"",intervalMonths:""});

  const car = data.cars.find(c=>c.id===selCarId)||data.cars[0]||null;
  const recs = data.records.filter(r=>r.carId===(car?.id||selCarId)).sort((a,b)=>b.date.localeCompare(a.date));
  const stdReminders = getCarReminders(car, recs);
  const custReminders = getCarCustomReminders(car, data);

  // 並び順適用
  const carOrder = (data.carItemOrders&&car)?( data.carItemOrders[car.id]||[]):[];
  const allRaw = [...stdReminders,...custReminders];
  const allReminders = carOrder.length>0
    ? [...allRaw].sort((a,b)=>{const iA=carOrder.indexOf(a.id),iB=carOrder.indexOf(b.id);if(iA===-1&&iB===-1)return 0;if(iA===-1)return 1;if(iB===-1)return -1;return iA-iB;})
    : allRaw;

  // ドラッグ＆ドロップ
  const onReorder = (newOrder) => {
    save({...data, carItemOrders:{...(data.carItemOrders||{}),[car.id]:newOrder}});
  };
  const { dragOverIdx, onDragStart, onDragOver, onDrop, onDragEnd, onTouchStart, onTouchMove, onTouchEnd } = useDragSort(allReminders, onReorder);

  const saveEditMaint = () => {
    if (!editMaint) return;
    if (editMaint.isCustom) {
      save({...data,carCustomMaints:(data.carCustomMaints||[]).map(cm=>cm.id===editMaint.id?{...cm,lastDate:editMaint.editDate||null,lastMileage:editMaint.editMileage?Number(editMaint.editMileage):null}:cm)});
    } else {
      const mileageVal=editMaint.editMileage?Number(editMaint.editMileage):0;
      const dateVal=editMaint.editDate?editMaint.editDate+"-01":new Date().toISOString().slice(0,10);
      const noteArr=[editMaint.editElementDone?"エレメント交換あり":"",editMaint.editRotationDone?"ローテーションあり":""].filter(Boolean);
      const newRec={id:data.nextRecordId,carId:car.id,type:editMaint.id,date:dateVal,oilDate:editMaint.id==="oil"?(editMaint.editDate||null):undefined,mileage:mileageVal,cost:0,note:noteArr.join(" ")};
      let upd={...data,records:[...data.records,newRec],nextRecordId:data.nextRecordId+1};
      if(editMaint.isOil&&editMaint.editInterval&&Number(editMaint.editInterval)!==car.oilInterval)
        upd.cars=upd.cars.map(c=>c.id===car.id?{...c,oilInterval:Number(editMaint.editInterval)}:c);
      if(mileageVal>(car.mileage||0))upd.cars=(upd.cars||data.cars).map(c=>c.id===car.id?{...c,mileage:mileageVal}:c);
      save(upd);
    }
    setEditMaint(null);
  };

  const addRecord=()=>{
    if(!rec.mileage||!car)return;
    if(rec.type==="oil"&&!rec.oilDate)return;
    const r={...rec,id:data.nextRecordId,carId:car.id,cost:Number(rec.cost)||0,mileage:Number(rec.mileage)};
    const upd={...data,records:[...data.records,r],nextRecordId:data.nextRecordId+1};
    if(r.mileage>(car.mileage||0))upd.cars=data.cars.map(c=>c.id===car.id?{...c,mileage:r.mileage}:c);
    save(upd);setShowRec(false);
    setRec({type:"oil",date:new Date().toISOString().slice(0,10),mileage:"",cost:"",note:"",oilDate:""});
  };
  const addCar=()=>{
    if(!newCar.name.trim())return;
    const c={...newCar,id:data.nextCarId,mileage:Number(newCar.mileage)||0};
    save({...data,cars:[...data.cars,c],nextCarId:data.nextCarId+1});
    setSelCarId(c.id);setShowAdd(false);
    setNewCar({name:"",maker:"",model:"",year:new Date().getFullYear(),mileage:"",color:"#2563eb",oilInterval:5000,oilType:"",shakenExpiry:"",jibaishaExpiry:"",firstReg:"",carType:"",chassisNo:""});
  };
  const updateCar=()=>{
    if(!editCar?.name.trim())return;
    save({...data,cars:data.cars.map(c=>c.id===editCar.id?{...editCar,mileage:Number(editCar.mileage)||0}:c)});
    setEditCar(null);
  };
  const deleteCar=(id)=>{
    if(data.cars.length<=1)return;
    const upd={...data,cars:data.cars.filter(c=>c.id!==id),records:data.records.filter(r=>r.carId!==id)};
    save(upd);if(selCarId===id)setSelCarId(upd.cars[0]?.id||0);
  };
  const addCustomMaint=()=>{
    if(!newMaint.label.trim())return;
    const cm={id:"cm_"+Date.now(),carId:car.id,label:newMaint.label.trim(),lastDate:newMaint.lastDate||null,lastMileage:newMaint.lastMileage?Number(newMaint.lastMileage):null,intervalKm:newMaint.intervalKm?Number(newMaint.intervalKm):null,intervalMonths:newMaint.intervalMonths?Number(newMaint.intervalMonths):null};
    save({...data,carCustomMaints:[...(data.carCustomMaints||[]),cm]});
    setShowAddMaint(false);setNewMaint({label:"",lastDate:"",lastMileage:"",intervalKm:"",intervalMonths:""});
  };
  const deleteCustomMaint=(id)=>save({...data,carCustomMaints:(data.carCustomMaints||[]).filter(cm=>cm.id!==id)});

  return e("div",null,
    // 車選択
    e("div",{style:{padding:"12px 14px",borderBottom:"1px solid #1e3a5f",display:"flex",gap:8,overflowX:"auto",alignItems:"center"}},
      ...data.cars.map(c=>
        e("button",{key:c.id,onClick:()=>setSelCarId(c.id),style:{padding:"8px 14px",borderRadius:12,border:selCarId===c.id?("2px solid "+c.color):"2px solid #1e3a5f",background:selCarId===c.id?(c.color+"22"):"#0d1f35",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontSize:13,fontWeight:600,color:selCarId===c.id?c.color:"#e2e8f0"}},c.name)
      ),
      e("button",{onClick:()=>setShowAdd(true),style:{padding:"8px 14px",borderRadius:12,border:"2px dashed #334155",background:"transparent",cursor:"pointer",color:"#64748b",whiteSpace:"nowrap",flexShrink:0,fontSize:12}},"追加"),
      e("button",{className:"btn-g",onClick:()=>setShowMgr(true),style:{fontSize:11,padding:"6px 10px",flexShrink:0,marginLeft:"auto"}},"車両管理")

  const [newItem, setNewItem] = useState({label:"",intervalMonths:12,note:""});

  const rawItems = (data.homeItems||[]);

  const onReorder=(newOrder)=>save({...data,homeOrder:newOrder});

    if(!newItem.label.trim())return;

      e("div",{style:{display:"flex",gap:0}},
        ["car","home"].map(tab=>
          e("button",{key:tab,onClick:()=>setMainTab(tab),style:{flex:1,padding:"10px",border:"none",background:"transparent",color:mainTab===tab?"#38bdf8":"#64748b",borderBottom:mainTab===tab?"2px solid #38bdf8":"2px solid transparent",fontSize:14,fontWeight:mainTab===tab?700:400,cursor:"pointer",fontFamily:"inherit",position:"relative"}},
            tab==="car"?"車":"家",
            tab==="car"&&carUrgent>0&&e("span",{style:{background:"#ef4444",color:"white",borderRadius:10,fontSize:9,padding:"1px 5px",marginLeft:4}},carUrgent),
            tab==="home"&&homeUrgent>0&&e("span",{style:{background:"#ef4444",color:"white",borderRadius:10,fontSize:9,padding:"1px 5px",marginLeft:4}},homeUrgent)
          )
        )
      )
    ),

    mainTab==="car"&&e(CarTab,{data,save}),
    mainTab==="home"&&e(HomeTab,{data,save})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
